<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter | YourWriteBuddy</title>
<meta name="description" content="Free online Word Counter with real-time word, character, sentence, paragraph count and reading time.">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f8fafc;
    color: #222;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.header {
    text-align: center;
    margin-bottom: 25px;
}

.header h1 {
    color: #2563eb;
}

.tool {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,.08);
}

textarea {
    width: 100%;
    height: 250px;
    padding: 15px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
    resize: vertical;
    outline: none;
}

textarea:focus {
    border-color: #2563eb;
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #f8fafc;
    padding: 18px;
    border-radius: 12px;
    text-align: center;
}

.card h3 {
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
}

.card span {
    font-size: 26px;
    font-weight: bold;
    color: #2563eb;
}

.buttons {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.copy {
    background: #2563eb;
    color: white;
}

.clear {
    background: #ef4444;
    color: white;
}

footer {
    text-align: center;
    margin-top: 25px;
    color: #777;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Word Counter</h1>
    </div>

    <div class="tool">
        <textarea id="text" placeholder="Type or paste your text here..."></textarea>

        <div class="stats">
            <div class="card"><h3>Words</h3><span id="words">0</span></div>
            <div class="card"><h3>Characters</h3><span id="chars">0</span></div>
            <div class="card"><h3>Sentences</h3><span id="sentences">0</span></div>
            <div class="card"><h3>Paragraphs</h3><span id="paragraphs">0</span></div>
            <div class="card"><h3>Reading Time</h3><span id="reading">0 min</span></div>
        </div>

        <div class="buttons">
            <button class="copy" onclick="copyText()">Copy</button>
            <button class="clear" onclick="clearText()">Clear</button>
        </div>
    </div>

    <footer>© 2026 YourWriteBuddy</footer>

</div>

<script>
const textArea = document.getElementById("text");

const ui = {
    words: document.getElementById("words"),
    chars: document.getElementById("chars"),
    sentences: document.getElementById("sentences"),
    paragraphs: document.getElementById("paragraphs"),
    reading: document.getElementById("reading")
};

textArea.addEventListener("input", updateStats);

function countWords(text) {
    const trimmed = text.trim();
    if (!trimmed) return 0;
    return trimmed.split(/\s+/).length;
}

function countSentences(text) {
    const trimmed = text.trim();
    if (!trimmed) return 0;

    // Better handling of multiple punctuation + avoids empty splits
    return (trimmed.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || []).length;
}

function countParagraphs(text) {
    const trimmed = text.trim();
    if (!trimmed) return 0;
    return trimmed.split(/\n+/).filter(p => p.trim()).length;
}

function updateStats() {
    const text = textArea.value;

    const words = countWords(text);
    const chars = text.length;
    const sentences = countSentences(text);
    const paragraphs = countParagraphs(text);
    const readingTime = Math.max(1, Math.ceil(words / 200));

    ui.words.textContent = words;
    ui.chars.textContent = chars;
    ui.sentences.textContent = sentences;
    ui.paragraphs.textContent = paragraphs;
    ui.reading.textContent = words ? readingTime + " min" : "0 min";
}

async function copyText() {
    try {
        await navigator.clipboard.writeText(textArea.value);
        alert("Copied to clipboard");
    } catch (e) {
        // fallback
        textArea.select();
        document.execCommand("copy");
        alert("Copied (fallback mode)");
    }
}

function clearText() {
    textArea.value = "";
    updateStats();
}

updateStats();
</script>

</body>
</html>
