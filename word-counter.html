<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Word Counter Pro | YourWriteBuddy</title>
<meta name="description" content="Professional word counter with word count, character count, sentence analysis, keyword density and reading metrics.">

<style>
:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1f2937;
    --accent: #2563eb;
    --muted: #6b7280;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 {
    margin: 0;
    color: var(--accent);
}

button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
}

textarea {
    width: 100%;
    height: 240px;
    margin-top: 15px;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ccc;
    resize: vertical;
    background: var(--card);
    color: var(--text);
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 20px;
}

.card {
    background: var(--card);
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    text-align: center;
}

.card h3 {
    font-size: 13px;
    color: var(--muted);
}

.card span {
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
}

.actions {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.primary {
    background: var(--accent);
    color: white;
}

.secondary {
    background: #ef4444;
    color: white;
}

.export {
    background: #10b981;
    color: white;
}

.small {
    background: #64748b;
    color: white;
}

footer {
    text-align: center;
    margin-top: 30px;
    color: var(--muted);
    font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>Word Counter Pro</h1>
    <button onclick="toggleTheme()">🌙 Theme</button>
</div>

<textarea id="input" placeholder="Paste or type text here..."></textarea>

<div class="stats">
    <div class="card"><h3>Words</h3><span id="words">0</span></div>
    <div class="card"><h3>Characters</h3><span id="chars">0</span></div>
    <div class="card"><h3>Sentences</h3><span id="sentences">0</span></div>
    <div class="card"><h3>Paragraphs</h3><span id="paras">0</span></div>
    <div class="card"><h3>Reading Time</h3><span id="read">0 min</span></div>
</div>

<div class="card" style="margin-top:15px;text-align:left;">
    <h3 style="margin-bottom:10px;">Top Keywords</h3>
    <div id="keywords" style="font-size:14px;color:var(--muted);"></div>
</div>

<div class="actions">
    <button class="primary" onclick="copyText()">Copy</button>
    <button class="secondary" onclick="clearText()">Clear</button>
    <button class="export" onclick="exportText()">Download TXT</button>
</div>

<footer>Professional writing tool • YourWriteBuddy</footer>

</div>

<script>
const input = document.getElementById("input");

input.addEventListener("input", update);

function countWords(text){
    return text.trim() ? text.trim().split(/\s+/).length : 0;
}

function countSentences(text){
    if(!text.trim()) return 0;
    return (text.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || []).length;
}

function countParagraphs(text){
    return text.trim() ? text.split(/\n+/).filter(p=>p.trim()).length : 0;
}

function getKeywords(text){
    const words = text.toLowerCase()
        .replace(/[^a-z\s]/gi,"")
        .split(/\s+/)
        .filter(w => w.length > 3);

    const freq = {};
    words.forEach(w => freq[w] = (freq[w] || 0) + 1);

    return Object.entries(freq)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5)
        .map(([w,c])=>`${w} (${c})`)
        .join(", ");
}

function update(){
    const text = input.value;

    const words = countWords(text);
    const chars = text.length;
    const sentences = countSentences(text);
    const paras = countParagraphs(text);
    const read = words ? Math.max(1, Math.ceil(words/200)) : 0;

    document.getElementById("words").textContent = words;
    document.getElementById("chars").textContent = chars;
    document.getElementById("sentences").textContent = sentences;
    document.getElementById("paras").textContent = paras;
    document.getElementById("read").textContent = read + " min";

    document.getElementById("keywords").textContent = getKeywords(text) || "No data";
}

async function copyText(){
    try {
        await navigator.clipboard.writeText(input.value);
    } catch {
        input.select();
        document.execCommand("copy");
    }
}

function clearText(){
    input.value = "";
    update();
}

function exportText(){
    const blob = new Blob([input.value], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "yourwritebuddy-text.txt";
    a.click();
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}

update();
</script>

</body>
</html>
