<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Counter | YourWriteBuddy</title>
<meta name="description" content="Free online character counter with word count, line count, and real-time text analysis.">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f8fafc;
    color: #111;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #2563eb;
}

textarea {
    width: 100%;
    height: 260px;
    padding: 15px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    resize: vertical;
}

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
}

.card h3 {
    font-size: 13px;
    color: #666;
}

.card span {
    font-size: 24px;
    font-weight: bold;
    color: #2563eb;
}

.buttons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.copy {
    background: #2563eb;
    color: white;
}

.clear {
    background: #ef4444;
    color: white;
}

footer {
    text-align: center;
    margin-top: 25px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

<h1>Character Counter</h1>

<textarea id="input" placeholder="Type or paste your text here..."></textarea>

<div class="stats">
    <div class="card">
        <h3>Characters (with spaces)</h3>
        <span id="charWith">0</span>
    </div>

    <div class="card">
        <h3>Characters (without spaces)</h3>
        <span id="charNo">0</span>
    </div>

    <div class="card">
        <h3>Words</h3>
        <span id="words">0</span>
    </div>

    <div class="card">
        <h3>Lines</h3>
        <span id="lines">0</span>
    </div>
</div>

<div class="buttons">
    <button class="copy" onclick="copyText()">Copy</button>
    <button class="clear" onclick="clearText()">Clear</button>
</div>

<footer>© 2026 YourWriteBuddy</footer>

</div>

<script>
const input = document.getElementById("input");

input.addEventListener("input", update);

function update() {
    const text = input.value;

    const charWithSpaces = text.length;
    const charNoSpaces = text.replace(/\s/g, "").length;

    const words = text.trim() ? text.trim().split(/\s+/).length : 0;

    const lines = text.trim() ? text.split(/\n/).length : 0;

    document.getElementById("charWith").textContent = charWithSpaces;
    document.getElementById("charNo").textContent = charNoSpaces;
    document.getElementById("words").textContent = words;
    document.getElementById("lines").textContent = lines;
}

function copyText() {
    navigator.clipboard.writeText(input.value).catch(() => {
        input.select();
        document.execCommand("copy");
    });
}

function clearText() {
    input.value = "";
    update();
}

update();
</script>

</body>
</html>
