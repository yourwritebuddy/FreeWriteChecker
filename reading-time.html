<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteBuddy - Reading & Speech Time Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus {
            border-color: #0070f3;
            outline: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: #ecf0f1;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #0070f3;
        }
        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Reading & Speech Time Calculator</h1>
    <p class="subtitle">Find out exactly how long it takes to read or present your text layout.</p>
    
    <textarea id="textInput" placeholder="Paste your script, essay, or speech content here..."></textarea>

    <div class="stats-grid">
        <div class="stat-box">
            <div id="readingTime" class="stat-number">0 min</div>
            <div class="stat-label">Silent Reading Time (225 WPM)</div>
        </div>
        <div class="stat-box">
            <div id="speakingTime" class="stat-number">0 min</div>
            <div class="stat-label">Speaking Speech Time (130 WPM)</div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const readingTime = document.getElementById('readingTime');
    const speakingTime = document.getElementById('speakingTime');

    textInput.addEventListener('input', () => {
        const text = textInput.value.trim();
        
        if (text.length === 0) {
            readingTime.textContent = "0 min";
            speakingTime.textContent = "0 min";
            return;
        }

        const words = text.split(/\s+/).filter(word => word.length > 0).length;
        
        const readMinutes = Math.ceil(words / 225);
        readingTime.textContent = readMinutes + (readMinutes === 1 ? " min" : " mins");

        const speakMinutes = Math.ceil(words / 130);
        speakingTime.textContent = speakMinutes + (speakMinutes === 1 ? " min" : " mins");
    });
</script>

</body>
</html>
