<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteBuddy - Word Counter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: #ecf0f1;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #2980b9;
        }
        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WriteBuddy</h1>
    <p class="subtitle">Type or paste your text below to get an instant count.</p>
    
    <textarea id="textInput" placeholder="Start typing here..."></textarea>

    <div class="stats-grid">
        <div class="stat-box">
            <div id="wordCount" class="stat-number">0</div>
            <div class="stat-label">Words</div>
        </div>
        <div class="stat-box">
            <div id="charCount" class="stat-number">0</div>
            <div class="stat-label">Characters</div>
        </div>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const wordCount = document.getElementById('wordCount');
    const charCount = document.getElementById('charCount');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        
        // Count characters
        charCount.textContent = text.length;
        
        // Count words (filters out empty spaces)
        const words = text.trim().split(/\s+/).filter(word => word.length > 0);
        wordCount.textContent = words.length;
    });
</script>

</body>
</html>
